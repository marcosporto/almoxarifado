<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="UDESC">
  <!-- Fundo branco arredondado: mantém o logo colorido legível tanto como ícone
       instalado quanto sobre o cabeçalho/tela de login (verde escuro). -->
  <rect width="512" height="512" rx="104" fill="#ffffff"/>
  <g fill="none" stroke-width="54" stroke-linecap="round">
    <!-- Arco superior (∩) — verde institucional -->
    <path d="M186 246 L186 176 A70 70 0 0 0 326 176 L326 246" stroke="#149954"/>
    <!-- Arco inferior (U) — verde escuro -->
    <path d="M186 266 L186 336 A70 70 0 0 1 326 336 L326 266" stroke="#054B28"/>
  </g>
  <!-- Pontos vermelhos da marca -->
  <circle cx="256" cy="170" r="23" fill="#EF4136"/>
  <circle cx="256" cy="342" r="23" fill="#C1282A"/>
</svg>
